name: yorimichi
options:
  bundleIdPrefix: com.yorimichi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ZD854UM35V
    GENERATE_INFOPLIST_FILE: YES
targets:
  yorimichi:
    type: application
    platform: iOS
    sources:
      - yorimichi
    info:
      path: yorimichi/Info.plist
      properties:
        LSApplicationQueriesSchemes:
          - comgooglemaps
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yorimichi.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "現在地を取得して、チェックイン場所を記録します。"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "写真をログに添付するため、フォトライブラリにアクセスします。"
        INFOPLIST_KEY_NSCameraUsageDescription: "写真を撮影してログに添付します。"
schemes:
  yorimichi:
    build:
      targets:
        yorimichi: all
    run:
      config: Debug
    archive:
      config: Release
