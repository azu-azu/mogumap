name: mogumap
include:
  - local.yml
options:
  bundleIdPrefix: com.tsukiusagi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Automatic
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    version: 0.9.20

targets:
  mogumap:
    type: application
    platform: iOS
    sources:
      - mogumap
    dependencies:
      - package: ZIPFoundation
    info:
      path: mogumap/Info.plist
      properties:
        CFBundleIconName: AppIcon
        NSLocationWhenInUseUsageDescription: "現在地を取得して、チェックイン場所を記録します。"
        NSCameraUsageDescription: "写真を撮影してログに添付します。"
        NSPhotoLibraryUsageDescription: "写真をログに添付するため、フォトライブラリにアクセスします。"
        LSApplicationQueriesSchemes:
          - comgooglemaps
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tsukiusagi.mogumap
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "現在地を取得して、チェックイン場所を記録します。"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "写真をログに添付するため、フォトライブラリにアクセスします。"
        INFOPLIST_KEY_NSCameraUsageDescription: "写真を撮影してログに添付します。"
        GENERATE_INFOPLIST_FILE: NO
schemes:
  mogumap:
    build:
      targets:
        mogumap: all
    run:
      config: Debug
    archive:
      config: Release
