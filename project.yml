name: yorimichi
options:
  bundleIdPrefix: com.yorimichi
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
targets:
  yorimichi:
    type: application
    platform: iOS
    sources:
      - yorimichi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yorimichi.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "現在地を取得して、チェックイン場所を記録します。"
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "写真をログに添付するため、フォトライブラリにアクセスします。"
schemes:
  yorimichi:
    build:
      targets:
        yorimichi: all
    run:
      config: Debug
    archive:
      config: Release
